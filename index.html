<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Планировщик рассадки гостей</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-layout">
    
    <!-- Боковая панель (на мобильных — нижний drawer) -->
    <aside class="sidebar" id="guestSidebar">
      <div class="sidebar-handle" id="sidebarHandle">☰ Гости</div>
      <div class="sidebar-inner">
        <div class="sidebar-header">
          <h2>👥 Гости</h2>
          <button class="btn btn-small" id="addGuestSidebarBtn">+</button>
        </div>
        
        <input type="text" class="search-input" id="guestSearch" placeholder="🔍 Поиск...">
        
        <div class="tag-filter" id="tagFilterContainer"></div>
        
        <div class="guest-list" id="guestListContainer"></div>
        
        <div class="sidebar-footer">
          <span id="seatedCount">0</span>/<span id="totalCount">0</span>
        </div>
      </div>
    </aside>

    <main class="main-area">
      
      <div class="toolbar">
        <div class="toolbar-row">
          <button class="btn btn-tool" id="addTableBtn">🪑 Стол</button>
          <div class="table-type-selector">
            <button class="btn btn-tool btn-shape active" data-shape="round" title="Круглый">⚪</button>
            <button class="btn btn-tool btn-shape" data-shape="rect" title="Прямоугольный">⬜</button>
            <button class="btn btn-tool btn-shape" data-shape="square" title="Квадратный">🔲</button>
            <button class="btn btn-tool btn-shape" data-shape="ushape" title="П-образный">🔳</button>
          </div>
        </div>
        <div class="toolbar-row">
          <div class="zoom-controls">
            <button class="btn btn-tool" id="zoomOut" title="Уменьшить">➖</button>
            <span class="zoom-label" id="zoomLabel">100%</span>
            <button class="btn btn-tool" id="zoomIn" title="Увеличить">➕</button>
          </div>
          <button class="btn btn-tool" id="saveBtn">💾</button>
          <button class="btn btn-tool" id="loadBtn">📂</button>
          <div class="table-scale-controls" id="tableScaleControls" style="display:none;">
            <button class="btn btn-tool" id="tableScaleOut">🔽</button>
            <span class="zoom-label" id="tableScaleLabel">100%</span>
            <button class="btn btn-tool" id="tableScaleIn">🔼</button>
            <button class="btn btn-tool" id="deselectTableBtn">✕</button>
          </div>
        </div>
      </div>

      <div class="canvas-wrapper" id="canvasWrapper">
        <div class="hall-canvas" id="hallCanvas"></div>
      </div>

    </main>
  </div>

  <!-- Модальное окно: гость -->
  <div class="modal-overlay hidden" id="guestModal">
    <div class="modal-card">
      <h3 id="modalTitle">Добавить гостя</h3>
      <input type="text" id="modalGuestName" placeholder="Имя гостя" maxlength="30">
      <input type="text" id="modalGuestTags" placeholder="Теги через запятую">
      <textarea id="modalGuestDesc" placeholder="Описание" rows="2"></textarea>
      <div class="modal-buttons">
        <button class="btn btn-cancel" id="modalCancel">Отмена</button>
        <button class="btn btn-primary" id="modalSave">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно: стол -->
  <div class="modal-overlay hidden" id="tableModal">
    <div class="modal-card">
      <h3>Настройки стола</h3>
      <label>Название:</label>
      <input type="text" id="modalTableName" placeholder="Название стола" maxlength="30">
      <label>Максимум гостей:</label>
      <select id="modalTableCapacity">
        <option value="2">2</option><option value="3">3</option><option value="4">4</option>
        <option value="5">5</option><option value="6" selected>6</option><option value="7">7</option>
        <option value="8">8</option><option value="9">9</option>
      </select>
      <div class="modal-buttons">
        <button class="btn btn-cancel" id="tableModalCancel">Отмена</button>
        <button class="btn btn-primary" id="tableModalSave">Сохранить</button>
        <button class="btn btn-danger" id="tableModalDelete">Удалить</button>
      </div>
    </div>
  </div>

  <div class="guest-tooltip hidden" id="guestTooltip"></div>

  <!-- Индикатор режима перемещения места -->
  <div class="move-mode-toast hidden" id="moveModeToast">Нажмите на новое место для перемещения</div>

  <script src="script.js"></script>
</body>
</html>
